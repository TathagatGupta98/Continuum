[package]
name = "continuum"
version = "0.1.0"
edition = "2024.beta"
# Continuum — unified continuous-distribution prediction market, ported from
# the Arbitrum Stylus (Rust/WASM) implementation to Sui Move.

[dependencies]
Sui = { git = "https://github.com/MystenLabs/sui.git", subdir = "crates/sui-framework/packages/sui-framework", rev = "framework/testnet", override = true }
# Pyth Network pull-oracle contracts (Sui testnet channel) + their Wormhole
# dependency. These let `market::resolve_with_pyth` read an on-chain price feed
# trustlessly for financial markets. `override = true` on Sui forces all three
# packages to compile against one framework rev (the testnet branch).
Pyth = { git = "https://github.com/pyth-network/pyth-crosschain.git", subdir = "target_chains/sui/contracts", rev = "sui-contract-testnet" }
Wormhole = { git = "https://github.com/wormhole-foundation/wormhole.git", subdir = "sui/wormhole", rev = "sui/testnet" }

[addresses]
continuum = "0x0"

[dev-addresses]
continuum = "0x0"
